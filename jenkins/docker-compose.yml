version: '3.8'

services:
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jenkins
    user: root
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins-data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - ~/.aws:/root/.aws:ro
      - ./casc.yml:/var/jenkins_home/casc.yml
    environment:
      - CASC_JENKINS_CONFIG=/var/jenkins_home/casc.yml
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false
      # These feed the ${...} placeholders in casc.yml — without them JCasC
      # fails to start. Values come from a .env file in this same folder
      # (copy jenkins/.env.example to jenkins/.env and fill it in).
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - GITHUB_USERNAME=${GITHUB_USERNAME}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
    networks:
      - monitoring
    restart: unless-stopped

volumes:
  jenkins-data:

networks:
  monitoring:
    external: true
