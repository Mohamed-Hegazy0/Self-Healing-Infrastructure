---
# 1. التأكد من وجود المكتبة اللي بتخلي أنسبل يتحكم في دوكر
- name: Ensure python3-docker is installed
  apt:
    name: python3-docker
    state: present
    update_cache: yes

# 2. أمر السحر: التأكد إن كونتينر التطبيق قايم وشغال
- name: Ensure self-healing-app container is running
  community.docker.docker_container:
    name: self-healing-app
    state: started
